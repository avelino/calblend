<!DOCTYPE html>
<html>
<head>
  <title>CalBlend Settings</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6366f1;
      margin-bottom: -4px;
    }
    .setting-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .slider-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    input[type="range"] {
      flex: 1;
    }
    .value {
      min-width: 40px;
      text-align: right;
    }
    html[dir="rtl"] .value {
      text-align: left;
    }
    .divider {
      border-top: 1px solid #e5e7eb;
      margin: 4px 0;
    }
    .setting-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .color-control {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 4px;
    }
    .color-preset {
      flex: 1;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .hex-input-wrapper {
      display: flex;
      align-items: center;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 0 6px;
      background: white;
    }
    .hex-input-wrapper span {
      color: #666;
    }
    .hex-input {
      width: 60px;
      border: none;
      padding: 6px 4px;
      font-family: monospace;
      outline: none;
    }
    .color-preview {
      width: 24px;
      height: 24px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .save-indicator {
      opacity: 0;
      color: #4CAF50;
      font-size: 0.8em;
      transition: opacity 0.3s ease;
    }
    .save-indicator.show {
      opacity: 1;
    }
    .hex-input.invalid {
      color: #dc3545;
    }
    .toggle-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
    }
    .toggle-grid label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .toggle-grid input[type="checkbox"] {
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="toggle-row">
      <label>
        <input type="checkbox" id="enableExtension" />
        <span id="enableText"></span>
      </label>
    </div>

    <div class="divider"></div>

    <!-- Visual Features -->
    <div class="section-label" id="sectionVisual"></div>
    <div class="toggle-grid">
      <label>
        <input type="checkbox" id="roundedEvents" />
        <span id="roundedEventsText"></span>
      </label>
      <label>
        <input type="checkbox" id="eventShadow" />
        <span id="eventShadowText"></span>
      </label>
      <label>
        <input type="checkbox" id="smoothAnimations" />
        <span id="smoothAnimationsText"></span>
      </label>
      <label>
        <input type="checkbox" id="improvedTypography" />
        <span id="improvedTypographyText"></span>
      </label>
      <label>
        <input type="checkbox" id="refinedColors" />
        <span id="refinedColorsText"></span>
      </label>
      <label>
        <input type="checkbox" id="refinedTimeLine" />
        <span id="refinedTimeLineText"></span>
      </label>
    </div>

    <div class="divider"></div>

    <!-- Layout Features -->
    <div class="section-label" id="sectionLayout"></div>
    <div class="toggle-grid">
      <label>
        <input type="checkbox" id="softGrid" />
        <span id="softGridText"></span>
      </label>
      <label>
        <input type="checkbox" id="modernUI" />
        <span id="modernUIText"></span>
      </label>
      <label>
        <input type="checkbox" id="cleanSidebar" />
        <span id="cleanSidebarText"></span>
      </label>
      <label>
        <input type="checkbox" id="cleanHeader" />
        <span id="cleanHeaderText"></span>
      </label>
      <label>
        <input type="checkbox" id="dimMiniCalendar" />
        <span id="dimMiniCalendarText"></span>
      </label>
    </div>

    <div class="divider"></div>

    <!-- Smart Features -->
    <div class="section-label" id="sectionSmart"></div>
    <div class="toggle-grid">
      <label>
        <input type="checkbox" id="focusMode" />
        <span id="focusModeText"></span>
      </label>
      <label>
        <input type="checkbox" id="highlightNextEvent" />
        <span id="highlightNextEventText"></span>
      </label>
      <label>
        <input type="checkbox" id="conflictIndicator" />
        <span id="conflictIndicatorText"></span>
      </label>
    </div>

    <div class="divider"></div>

    <!-- Merge Settings -->
    <div class="section-label" id="sectionMerge"></div>
    <div class="toggle-row">
      <label>
        <input type="checkbox" id="enableWeekends" />
        <span id="weekendsText"></span>
      </label>
    </div>
    <div class="setting-row">
      <label for="gradientOpacity" id="opacityLabel"></label>
      <div class="slider-container">
        <input type="range" id="gradientOpacity" min="0" max="1" step="0.05" />
        <span id="opacityValue" class="value"></span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Theme Settings -->
    <div class="section-label" id="sectionTheme"></div>
    <div class="setting-group">
      <label for="theme-select" id="themeSelectLabel"></label>
      <select id="theme-select">
        <option value="system" id="themeSystemOption"></option>
        <option value="light" id="themeLightOption"></option>
        <option value="dark" id="themeDarkOption"></option>
      </select>
    </div>
    <div class="setting-group">
      <label for="light-theme-color" id="lightThemeColorLabel"></label>
      <div class="color-control">
        <select id="light-color-preset" class="color-preset">
          <option value="" id="colorCustomOption"></option>
          <option value="#f1f6ff" id="colorDefaultBlueOption"></option>
          <option value="#f5f5f5" id="colorLightGrayOption"></option>
          <option value="#fff3e0" id="colorWarmBeigeOption"></option>
          <option value="#f3e5f5" id="colorSoftPurpleOption"></option>
          <option value="#e8f5e9" id="colorMintGreenOption"></option>
        </select>
        <div class="hex-input-wrapper">
          <span>#</span>
          <input type="text" id="light-hex-color" class="hex-input" maxlength="6" placeholder="f1f6ff">
        </div>
        <div class="color-preview" id="light-preview"></div>
        <span class="save-indicator" id="light-saved">Saved!</span>
      </div>
    </div>
    <div class="setting-group">
      <label for="dark-theme-color" id="darkThemeColorLabel"></label>
      <div class="color-control">
        <select id="dark-color-preset" class="color-preset">
          <option value="" id="colorCustomOptionDark"></option>
          <option value="#1a1a1a" id="colorDefaultDarkOption"></option>
          <option value="#2d2d2d" id="colorSoftBlackOption"></option>
          <option value="#263238" id="colorBlueGrayOption"></option>
          <option value="#1b1b24" id="colorNavyDarkOption"></option>
          <option value="#2d2d2d" id="colorCharcoalOption"></option>
        </select>
        <div class="hex-input-wrapper">
          <span>#</span>
          <input type="text" id="dark-hex-color" class="hex-input" maxlength="6" placeholder="1a1a1a">
        </div>
        <div class="color-preview" id="dark-preview"></div>
        <span class="save-indicator" id="dark-saved">Saved!</span>
      </div>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
