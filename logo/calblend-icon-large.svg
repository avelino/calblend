<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="blend" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="blend2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <!-- Back card -->
  <rect x="26" y="10" width="80" height="80" rx="16" fill="url(#blend2)" opacity="0.6"/>
  <!-- Front card (offset) -->
  <rect x="22" y="38" width="80" height="80" rx="16" fill="url(#blend)"/>
  <!-- Overlap/merge zone -->
  <rect x="26" y="38" width="76" height="52" rx="10" fill="white" opacity="0.15"/>
</svg>
