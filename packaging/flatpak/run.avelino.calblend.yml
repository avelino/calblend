app-id: run.avelino.calblend
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: calblend

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher

modules:
  - name: calblend
    buildsystem: simple
    build-commands:
      - chmod +x CalBlend_0.1.0_amd64.AppImage
      - ./CalBlend_0.1.0_amd64.AppImage --appimage-extract
      - install -d /app/bin
      - cp -r squashfs-root/* /app/bin/
      - ln -sf /app/bin/AppRun /app/bin/calblend
      - install -Dm644 run.avelino.calblend.desktop /app/share/applications/run.avelino.calblend.desktop
      - install -Dm644 run.avelino.calblend.metainfo.xml /app/share/metainfo/run.avelino.calblend.metainfo.xml
    sources:
      - type: file
        url: https://github.com/avelino/calblend/releases/download/beta/CalBlend_0.1.0_amd64.AppImage
        sha256: __SHA256__
      - type: file
        path: run.avelino.calblend.desktop
      - type: file
        path: run.avelino.calblend.metainfo.xml
